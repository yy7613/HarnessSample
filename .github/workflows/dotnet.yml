name: dotnet

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore HarnessSample.slnx

      - name: Build
        run: dotnet build HarnessSample.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/HarnessSample.Tests/HarnessSample.Tests.csproj --configuration Release --no-build --verbosity normal